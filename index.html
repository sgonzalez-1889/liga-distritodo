<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#050e1f">
<title>Ranking de Ventas - Mundial 2026 | Ferrotodo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --gold:   #FFD700;
  --gold2:  #FFA500;
  --dark:   #050e1f;
  --dark2:  #0a1929;
  --mid:    #112240;
  --accent: #E53935;
  --green:  #00C853;
  --txt:    #E8F0FF;
  --muted:  #5a7aaa;
  --border: rgba(255,215,0,0.2);
  --card:   rgba(10,25,41,0.9);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Oswald', Arial, sans-serif;
  background: #050e1f;
  color: #E8F0FF;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── FONDO ── */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(13,71,161,0.4) 0%, transparent 70%),
    radial-gradient(ellipse 50% 30% at 50% 100%, rgba(0,80,30,0.25) 0%, transparent 70%),
    #050e1f;
}

/* cuadrícula cancha */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 80px 80px;
}

/* banda tricolor top */
.tricolor {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #E53935 0 33%, #FFD700 33% 66%, #1565C0 66% 100%);
  z-index: 100;
}

/* balones decorativos */
.bola {
  position: fixed;
  font-size: 50px;
  opacity: 0.05;
  pointer-events: none;
  z-index: 0;
  animation: subirBola linear infinite;
}
@keyframes subirBola {
  0%   { transform: translateY(110vh) rotate(0deg); }
  100% { transform: translateY(-150px) rotate(540deg); }
}

/* ── WRAPPER ── */
#app { position: relative; z-index: 1; min-height: 100vh; }

/* ════════════════════════════════
   LOGIN SCREEN
════════════════════════════════ */
#loginScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 60px 20px 40px;
  text-align: center;
  position: relative;
  z-index: 2;
}

.login-trofeo {
  font-size: 88px;
  display: block;
  margin-bottom: 16px;
  animation: pulseTrofeo 2.5s ease-in-out infinite;
}
@keyframes pulseTrofeo {
  0%,100% { transform: scale(1) translateY(0); }
  50%      { transform: scale(1.08) translateY(-8px); }
}

.login-org {
  font-size: 11px;
  letter-spacing: 5px;
  color: #5a7aaa;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.login-titulo {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: clamp(48px, 10vw, 96px);
  letter-spacing: 5px;
  line-height: 0.9;
  color: #FFD700;
  margin-bottom: 8px;
}

.login-anio {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: clamp(20px, 4vw, 36px);
  letter-spacing: 12px;
  color: rgba(255,255,255,0.15);
  margin-bottom: 20px;
}

.pill-rojo {
  display: inline-block;
  background: linear-gradient(135deg, #B71C1C, #E53935);
  color: #fff;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 6px 20px;
  border-radius: 30px;
  margin-bottom: 32px;
  text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(229,57,53,0.4);
}

/* sedes */
.sedes {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 380px;
  margin-bottom: 36px;
}
.sede {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  font-size: 10px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.35);
  padding: 3px 9px;
}

/* card login */
.login-card {
  width: 100%;
  max-width: 400px;
  background: rgba(10,25,41,0.92);
  border: 1px solid rgba(255,215,0,0.22);
  border-radius: 20px;
  padding: 32px 28px 28px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  position: relative;
}
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #FFD700, #FFA500, #FF6D00);
  border-radius: 20px 20px 0 0;
}

.lock-ico { font-size: 34px; display: block; margin-bottom: 12px; }

.lc-titulo {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 24px;
  letter-spacing: 3px;
  color: #FFD700;
  margin-bottom: 6px;
}

.lc-hint {
  font-size: 12px;
  color: #5a7aaa;
  margin-bottom: 24px;
  letter-spacing: 0.3px;
  line-height: 1.5;
}

.pwd-wrap { position: relative; margin-bottom: 14px; }

.pwd-inp {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,215,0,0.25);
  border-radius: 12px;
  padding: 14px 50px 14px 18px;
  color: #E8F0FF;
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  letter-spacing: 4px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.pwd-inp::placeholder {
  font-size: 13px;
  letter-spacing: 2px;
  color: rgba(90,122,170,0.5);
}
.pwd-inp:focus {
  border-color: #FFD700;
  box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
}
.pwd-inp.err {
  border-color: #E53935;
  box-shadow: 0 0 0 3px rgba(229,57,53,0.15);
  animation: shake 0.4s;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(8px); }
  60%      { transform: translateX(-5px); }
  80%      { transform: translateX(5px); }
}

.eye-btn {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer;
  font-size: 18px;
  color: #5a7aaa;
  padding: 4px;
  transition: color 0.2s;
}
.eye-btn:hover { color: #FFD700; }

.btn-entrar {
  width: 100%;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: #050e1f;
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(255,165,0,0.35);
}
.btn-entrar:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(255,165,0,0.5);
}

.err-txt {
  display: none;
  color: #FF5252;
  font-size: 12px;
  letter-spacing: 1px;
  margin-top: 12px;
}
.err-txt.show { display: block; }

/* ════════════════════════════════
   MAIN APP
════════════════════════════════ */
#mainApp { display: none; position: relative; z-index: 2; }

.btn-salir {
  position: fixed;
  top: 14px; right: 14px;
  z-index: 200;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.4);
  font-family: 'Oswald', sans-serif;
  font-size: 11px; letter-spacing: 2px;
  padding: 7px 16px; border-radius: 20px;
  cursor: pointer; transition: all 0.2s;
}
.btn-salir:hover {
  background: rgba(229,57,53,0.2);
  color: #FF5252;
}

/* ── HEADER ── */
.header {
  padding: 48px 20px 32px;
  text-align: center;
  position: relative;
}

.hdr-linea {
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, #E53935, #FFD700, #00C853, #FFD700, #E53935);
  background-size: 300% 100%;
  animation: moverLinea 5s linear infinite;
}
@keyframes moverLinea {
  0%   { background-position: 0%; }
  100% { background-position: 300%; }
}

.hdr-copa { font-size: 80px; display: block; margin-bottom: 10px; }

.hdr-titulo {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: clamp(48px, 8vw, 96px);
  letter-spacing: 5px;
  line-height: 0.9;
  color: #FFD700;
  margin-bottom: 8px;
}

.hdr-sub {
  font-size: clamp(11px, 2.5vw, 15px);
  letter-spacing: 7px;
  color: #5a7aaa;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.hdr-pill {
  display: inline-block;
  background: linear-gradient(135deg, rgba(229,57,53,0.25), rgba(183,28,28,0.35));
  border: 1px solid rgba(229,57,53,0.4);
  color: #FF8A80;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 4px 16px;
  border-radius: 20px;
  margin-bottom: 20px;
  text-transform: uppercase;
}

.marcador {
  display: inline-flex;
  align-items: stretch;
  background: #000;
  border: 2px solid rgba(255,215,0,0.3);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.mb-equipo {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 14px; letter-spacing: 2px;
  padding: 8px 16px;
  color: rgba(255,255,255,0.6);
}
.mb-sep {
  background: rgba(255,215,0,0.08);
  border-left: 1px solid rgba(255,215,0,0.2);
  border-right: 1px solid rgba(255,215,0,0.2);
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 20px; color: #FFD700;
  padding: 8px 14px;
}

/* ── UPLOAD ── */
.upload-sec { max-width: 540px; margin: 28px auto; padding: 0 16px; }

.upload-zona {
  border: 2px dashed rgba(255,215,0,0.35);
  border-radius: 20px;
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  background: rgba(10,25,41,0.7);
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.upload-zona:hover, .upload-zona.activa {
  border-color: #FFD700;
  background: rgba(20,40,80,0.8);
  box-shadow: 0 0 30px rgba(255,215,0,0.1);
}

.uz-ico { font-size: 42px; display: block; margin-bottom: 10px; }
.uz-titulo {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 24px; letter-spacing: 3px;
  color: #FFD700; margin-bottom: 6px;
}
.uz-hint { font-size: 12px; color: #5a7aaa; margin-bottom: 18px; }

.btn-excel {
  display: inline-flex;
  align-items: center; gap: 8px;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: #050e1f;
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 18px; letter-spacing: 3px;
  padding: 12px 30px;
  border-radius: 30px; border: none;
  cursor: pointer; transition: all 0.2s;
}
.btn-excel:hover { transform: scale(1.05); box-shadow: 0 0 24px rgba(255,165,0,0.4); }
#fileIn { display: none; }

.file-ok {
  display: none;
  align-items: center; justify-content: center; gap: 8px;
  margin-top: 14px; padding: 10px 18px;
  background: rgba(0,200,83,0.1);
  border: 1px solid rgba(0,200,83,0.3);
  border-radius: 10px;
  color: #00C853; font-size: 13px; letter-spacing: 1px;
}

/* ── STATS ── */
.stats-fila {
  display: none;
  max-width: 960px;
  margin: 0 auto 28px;
  padding: 0 16px;
  gap: 10px; flex-wrap: wrap; justify-content: center;
}
.stat {
  flex: 1; min-width: 130px;
  background: rgba(10,25,41,0.85);
  border: 1px solid rgba(255,215,0,0.18);
  border-radius: 14px;
  padding: 14px 12px;
  text-align: center;
}
.stat-ico { font-size: 22px; margin-bottom: 4px; }
.stat-num {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 32px; color: #FFD700; line-height: 1;
}
.stat-lbl { font-size: 10px; color: #5a7aaa; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

/* ── RANKING ── */
.ranking-wrap {
  display: none;
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 16px 56px;
}
.ranking-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 720px) { .ranking-grid { grid-template-columns: 1fr; } }

.panel {
  background: rgba(10,25,41,0.88);
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}

/* panel header */
.ph {
  padding: 18px 20px;
  display: flex; align-items: center; gap: 12px;
}
.ph.ferr { background: linear-gradient(135deg, #3E1F00, #6B3000); }
.ph.cli  { background: linear-gradient(135deg, #0D2050, #1A3A80); }
.ph-ico { font-size: 32px; }
.ph-text { flex: 1; }
.ph-titulo {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 26px; letter-spacing: 2px; line-height: 1;
}
.ph-sub { font-size: 10px; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; margin-top: 2px; }
.ph-cnt {
  background: rgba(0,0,0,0.3);
  font-size: 11px; letter-spacing: 1px;
  padding: 4px 10px; border-radius: 20px;
  color: rgba(255,255,255,0.45);
}

/* PODIO */
.podio {
  display: grid;
  grid-template-columns: 1fr 1.15fr 1fr;
  gap: 8px;
  padding: 16px 12px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.p-item {
  text-align: center;
  padding: 12px 6px;
  border-radius: 14px;
  cursor: default;
  transition: transform 0.2s;
}
.p-item:hover { transform: translateY(-3px); }
.p1 { background: rgba(255,215,0,0.1);     border: 1px solid rgba(255,215,0,0.22); }
.p2 { background: rgba(192,192,192,0.08);  border: 1px solid rgba(192,192,192,0.15); }
.p3 { background: rgba(205,127,50,0.08);   border: 1px solid rgba(205,127,50,0.15); }

.p-medalla { font-size: 28px; display: block; margin-bottom: 6px; }
.p-av {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 15px;
  margin: 0 auto 6px;
  font-weight: 700;
}
.av-gold-f { background: linear-gradient(135deg,#FF8F00,#E65100); color: #fff; box-shadow: 0 0 14px rgba(255,143,0,0.4); }
.av-gold-c { background: linear-gradient(135deg,#1976D2,#0D47A1); color: #fff; box-shadow: 0 0 14px rgba(25,118,210,0.4); }
.av-plata  { background: linear-gradient(135deg,#CFD8DC,#90A4AE); color: #050e1f; }
.av-bronce { background: linear-gradient(135deg,#CD7F32,#A0522D); color: #fff; }

.p-nombre {
  font-size: 11px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}
.p-pts {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 24px; color: #FFD700; line-height: 1;
}
.p-lbl { font-size: 8px; color: #5a7aaa; letter-spacing: 2px; text-transform: uppercase; }

/* lista 4-10 */
.lista { padding: 4px 0 6px; }
.li {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
  animation: liEntra 0.35s ease both;
}
.li:hover { background: rgba(255,215,0,0.04); }
.li:last-child { border-bottom: none; }
@keyframes liEntra { from { opacity:0; transform: translateX(-14px); } to { opacity:1; transform: translateX(0); } }
.li:nth-child(1){animation-delay:.03s} .li:nth-child(2){animation-delay:.06s}
.li:nth-child(3){animation-delay:.09s} .li:nth-child(4){animation-delay:.12s}
.li:nth-child(5){animation-delay:.15s} .li:nth-child(6){animation-delay:.18s}
.li:nth-child(7){animation-delay:.21s}

.li-num {
  width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: #5a7aaa;
}
.li-av {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 13px; font-weight: 700;
}
.li-av.f { background: linear-gradient(135deg,#7B3F00,#D97706); color: #fff; }
.li-av.c { background: linear-gradient(135deg,#1E40AF,#2563EB); color: #fff; }

.li-info { flex: 1; min-width: 0; }
.li-nombre {
  font-size: 12px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.li-barra { height: 2px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 4px; }
.li-fill  { height: 100%; border-radius: 2px; background: linear-gradient(90deg, rgba(255,215,0,0.5), rgba(255,165,0,0.25)); }

.li-r { text-align: right; flex-shrink: 0; }
.li-pts { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 22px; color: #FFD700; line-height: 1; }
.li-pl  { font-size: 8px; color: #5a7aaa; letter-spacing: 2px; text-transform: uppercase; }

.vacio { padding: 28px; text-align: center; color: #5a7aaa; font-size: 12px; letter-spacing: 1px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: rgba(229,57,53,0.95); color: #fff;
  font-size: 13px; letter-spacing: 1px;
  padding: 10px 22px; border-radius: 30px;
  transition: transform 0.3s; z-index: 999;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── FOOTER ── */
.footer {
  text-align: center; padding: 16px;
  color: rgba(255,255,255,0.15); font-size: 10px; letter-spacing: 3px;
  border-top: 1px solid rgba(255,255,255,0.05);
  text-transform: uppercase;
}

/* ── SCROLL ── */
.scroll-btn {
  position: fixed; bottom: 20px; right: 20px; z-index: 100;
  background: #FFD700; color: #050e1f;
  width: 38px; height: 38px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 15px;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(255,165,0,0.35);
  transition: transform 0.2s;
}
.scroll-btn:hover { transform: scale(1.1); }
.scroll-btn.show { display: flex; }
</style>
</head>
<body>

<!-- Fondo -->
<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="tricolor"></div>
<span class="bola" style="left:8%;animation-duration:22s;animation-delay:0s">&#9917;</span>
<span class="bola" style="left:72%;animation-duration:28s;animation-delay:-9s">&#9917;</span>
<span class="bola" style="left:42%;animation-duration:35s;animation-delay:-18s;font-size:36px">&#9917;</span>

<div id="app">

<!-- ══════ LOGIN ══════ -->
<div id="loginScreen" style="display:flex">

  <span class="login-trofeo">&#127942;</span>
  <div class="login-org">Ferrotodo &nbsp;&#183;&nbsp; Colombia</div>
  <div class="login-titulo">RANKING<br>DE VENTAS</div>
  <div class="login-anio">2 0 2 6</div>

  <div class="pill-rojo">&#9917; FIFA WORLD CUP 2026</div>

  <div class="sedes">
    <span class="sede">NEW YORK</span>
    <span class="sede">LOS ANGELES</span>
    <span class="sede">MIAMI</span>
    <span class="sede">TORONTO</span>
    <span class="sede">MEXICO CITY</span>
    <span class="sede">DALLAS</span>
  </div>

  <div class="login-card">
    <span class="lock-ico">&#128272;</span>
    <div class="lc-titulo">ZONA RESTRINGIDA</div>
    <div class="lc-hint">Ingresa la contrase&ntilde;a para acceder al panel de resultados</div>

    <div class="pwd-wrap">
      <input class="pwd-inp" id="pwdIn" type="password"
        placeholder="Contrase&ntilde;a de acceso"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
